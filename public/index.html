<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riley - RealWealth AI Assistant</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    
    .container {
      text-align: center;
      padding: 40px;
      max-width: 500px;
      width: 100%;
    }
    
    .logo {
      font-size: 48px;
      margin-bottom: 10px;
    }
    
    h1 {
      font-size: 32px;
      margin-bottom: 8px;
      font-weight: 600;
    }
    
    .subtitle {
      color: #8892b0;
      margin-bottom: 40px;
      font-size: 16px;
    }
    
    #callButton {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(76, 175, 80, 0.3);
    }
    
    #callButton:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(76, 175, 80, 0.4);
    }
    
    #callButton:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    #callButton.active {
      background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
      box-shadow: 0 8px 32px rgba(244, 67, 54, 0.3);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0.4); }
      70% { box-shadow: 0 0 0 20px rgba(244, 67, 54, 0); }
      100% { box-shadow: 0 0 0 0 rgba(244, 67, 54, 0); }
    }
    
    .status {
      margin-top: 30px;
      font-size: 14px;
      padding: 12px 24px;
      border-radius: 25px;
      display: inline-block;
      background: rgba(255,255,255,0.1);
    }
    
    .status.connected {
      background: rgba(76, 175, 80, 0.2);
      color: #81c784;
    }
    
    .status.speaking {
      background: rgba(33, 150, 243, 0.2);
      color: #64b5f6;
    }
    
    .status.connecting {
      background: rgba(255, 193, 7, 0.2);
      color: #ffd54f;
    }
    
    .status.error {
      background: rgba(244, 67, 54, 0.2);
      color: #ef5350;
    }
    
    #transcript {
      margin-top: 30px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      max-height: 200px;
      overflow-y: auto;
      text-align: left;
      font-size: 14px;
      line-height: 1.6;
    }
    
    #transcript:empty {
      display: none;
    }
    
    #transcript p {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    #transcript p:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }
    
    .instructions {
      margin-top: 40px;
      font-size: 13px;
      color: #8892b0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🏠</div>
    <h1>Riley</h1>
    <p class="subtitle">RealWealth AI Assistant</p>
    
    <button id="callButton" onclick="toggleCall()">Start Call</button>
    
    <p id="status" class="status idle">Click to start a conversation</p>
    
    <div id="transcript"></div>
    
    <p class="instructions">
      Click the button and allow microphone access to speak with Riley.<br>
      Riley can answer questions about RealWealth services and schedule appointments.
    </p>
  </div>
  
  <script src="/bundle.js"></script>
</body>
</html>
